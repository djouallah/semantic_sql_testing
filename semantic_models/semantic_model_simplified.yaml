# yaml-language-server: $schema=https://raw.githubusercontent.com/open-semantic-interchange/OSI/main/core-spec/osi-schema.json

# TPC-DS Star Schema — Simplified Unified-View Semantic Model (v2)
# SF=1 | DuckDB | 1998–2003
# Sales: 2,880,404 rows | Returns: 287,867 rows

version: "0.1.1"

semantic_model:
  - name: tpcds_store_model_simplified
    description: "TPC-DS store semantic model v2 — unified v_transactions view (store_sales UNION ALL store_returns). SF=1, DuckDB, 1998–2003."
    ai_context:
      instructions: |
        You are a SQL query generator. Given a user question, produce a single correct DuckDB SQL query.
        - Use ONLY the tables and view defined in this semantic model.
        - Add the question as a comment at the top of the SQL.
        - Return only the SQL query, no explanation.

        === Model Objective ===
        Analyze store sales and return performance using the unified v_transactions view.
        v_transactions is store_sales and store_returns stacked vertically (UNION ALL).
        Each row belongs to exactly one fact table — no joins between facts needed.
        sale_amount = 0 on return rows. return_amount = 0 on sale rows.
        SUM(sale_amount) and SUM(return_amount) are always safe to compute together.

        === CRITICAL: Never filter on sale_amount or return_amount ===
        NEVER add WHERE sale_amount > 0 or WHERE return_amount > 0.
        Zeros are legitimate data — filtering them corrupts aggregation denominators.
        For return_rate: a product sold 100 times but returned once has return_rate = 1%.
        If you filter WHERE return_amount > 0, you keep only the 1 returned row and get 100%.
        Always aggregate ALL rows. Let SUM() handle the zeros.

        Exception — use row_type to distinguish sale vs return rows inside COUNT:
          sales_tickets  = COUNT(DISTINCT CASE WHEN row_type = 'sale'   THEN ticket_number END)
          return_tickets = COUNT(DISTINCT CASE WHEN row_type = 'return' THEN ticket_number END)
        Do NOT use sale_amount > 0 as a proxy — sale rows can have sale_amount = 0 (NULL price/qty).
        Do NOT use COUNT(DISTINCT ticket_number) alone — counts both sale and return rows.

        === Measures (always aggregate from v_transactions) ===
        total_sales    = SUM(sale_amount)        -- sale_amount = ss_sales_price * ss_quantity
        total_quantity = SUM(quantity)           -- units sold
        total_returns  = SUM(return_amount)      -- return_amount = sr_return_amt
        net_sales      = SUM(sale_amount) - SUM(return_amount)
        return_rate    = (SUM(return_amount) / NULLIF(SUM(sale_amount), 0)) * 100
        sales_tickets             = COUNT(DISTINCT CASE WHEN row_type = 'sale' THEN ticket_number END)
        avg_net_sales_per_ticket  = (SUM(sale_amount) - SUM(return_amount)) / NULLIF(COUNT(DISTINCT CASE WHEN row_type = 'sale' THEN ticket_number END), 0)
        -- "average net sales per transaction" means this ratio, NOT AVG()

        === Age Group ===
        Compute inline in SELECT using date_dim.d_year and customer.c_birth_year.
        If c_birth_year is NULL the CASE returns NULL — do NOT use COALESCE(c_birth_year, 0).
        NULL age group rows are automatically excluded from GROUP BY results.
          CASE
            WHEN (d.d_year - c.c_birth_year) < 20              THEN '< 20'
            WHEN (d.d_year - c.c_birth_year) BETWEEN 20 AND 29 THEN '20-29'
            WHEN (d.d_year - c.c_birth_year) BETWEEN 30 AND 39 THEN '30-39'
            WHEN (d.d_year - c.c_birth_year) BETWEEN 40 AND 49 THEN '40-49'
            WHEN (d.d_year - c.c_birth_year) BETWEEN 50 AND 59 THEN '50-59'
            WHEN (d.d_year - c.c_birth_year) >= 60             THEN '60+'
          END AS age_group

        === NULL Handling ===
        Filter NULLs explicitly when question asks for distinct values or excludes unknowns.
        Nullable: c_preferred_cust_flag, c_birth_country, c_birth_year,
                  i_category, i_brand, i_class, i_product_name
        customer_sk in v_transactions can be NULL — use LEFT JOIN to customer.

        === Pure Dimension Queries ===
        For questions that only list dimension values (no measures), query dim tables directly:
          SELECT s_store_name FROM store ORDER BY s_store_name
          SELECT DISTINCT i_category FROM item WHERE i_category IS NOT NULL ORDER BY i_category

        === VERIFIED QUERY PATTERNS ===

        Pattern 1: Simple aggregation (sales only)
        SELECT SUM(sale_amount) AS total_sales FROM v_transactions

        Pattern 2: Aggregation by dimension
        SELECT d.d_year, SUM(v.sale_amount) AS total_sales
        FROM v_transactions v
        JOIN date_dim d ON v.date_sk = d.d_date_sk
        GROUP BY d.d_year ORDER BY d.d_year

        Pattern 3: Return rate by dimension
        Never filter by return_amount > 0 — include ALL rows so the denominator (total_sales)
        is correct. Rows with no sale contribute 0 to SUM(sale_amount) automatically.
        SELECT i.i_category,
               (SUM(v.return_amount) / NULLIF(SUM(v.sale_amount), 0)) * 100 AS return_rate
        FROM v_transactions v
        JOIN item i ON v.item_sk = i.i_item_sk
        WHERE i.i_category IS NOT NULL
        GROUP BY i.i_category ORDER BY i.i_category

        Pattern 4: Net sales by store
        SELECT s.s_store_name,
               SUM(v.sale_amount) - SUM(v.return_amount) AS net_sales
        FROM v_transactions v
        JOIN store s ON v.store_sk = s.s_store_sk
        GROUP BY s.s_store_name ORDER BY net_sales DESC

        Pattern 5: All measures together (sales, returns, net, return rate) by store and year
        Because v_transactions is UNION ALL, all measures aggregate correctly in a single GROUP BY —
        no CTEs needed.
        SELECT s.s_store_name,
               d.d_year,
               SUM(v.sale_amount)                                              AS total_sales,
               SUM(v.return_amount)                                            AS total_returns,
               SUM(v.sale_amount) - SUM(v.return_amount)                      AS net_sales,
               (SUM(v.return_amount) / NULLIF(SUM(v.sale_amount), 0)) * 100   AS return_rate
        FROM v_transactions v
        JOIN store    s ON v.store_sk = s.s_store_sk
        JOIN date_dim d ON v.date_sk  = d.d_date_sk
        GROUP BY s.s_store_name, d.d_year
        ORDER BY s.s_store_name, d.d_year

    datasets:
      - name: date_dim
        source: date_dim
        primary_key: [d_date_sk]
        unique_keys:
          - [d_date_sk]
        description: Date dimension — 73,049 rows, calendar dates 1998–2003
        ai_context:
          synonyms: ["calendar", "dates", "time periods", "when"]
        fields:
          - name: d_date_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_date_sk
            description: Surrogate key for date
            dimension:
              is_time: false

          - name: d_year
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_year
            description: Calendar year (4-digit, range 1998–2003)
            dimension:
              is_time: true
            ai_context:
              synonyms: ["year", "fiscal year"]

          - name: d_moy
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_moy
            description: Month of year (1–12)
            dimension:
              is_time: true
            ai_context:
              synonyms: ["month", "month number"]

          - name: d_qoy
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_qoy
            description: Quarter of year (1–4)
            dimension:
              is_time: true
            ai_context:
              synonyms: ["quarter", "fiscal quarter"]

          - name: d_weekend
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_weekend
            description: "Weekend indicator — raw values: 'Y' or 'N'. Use as-is, do NOT remap to 'weekend'/'weekday'."
            dimension:
              is_time: false
            ai_context:
              synonyms: ["weekend", "weekend flag"]

          - name: d_holiday
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_holiday
            description: Holiday indicator (Y=holiday, N=not holiday)
            dimension:
              is_time: false
            ai_context:
              synonyms: ["holiday", "holiday flag"]

          - name: d_day_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_day_name
            description: Full day name (e.g. Monday, Sunday)
            dimension:
              is_time: false
            ai_context:
              synonyms: ["day name", "weekday name"]

      - name: store
        source: store
        primary_key: [s_store_sk]
        unique_keys:
          - [s_store_id]
        description: Store dimension — 12 rows
        ai_context:
          synonyms: ["stores", "retail locations", "branches", "shop"]
        fields:
          - name: s_store_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: s_store_sk
            description: Surrogate key for store
            dimension:
              is_time: false

          - name: s_store_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: s_store_name
            description: Store display name
            dimension:
              is_time: false
            ai_context:
              synonyms: ["store name", "location name", "branch name"]

          - name: s_city
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: s_city
            description: City where store is located
            dimension:
              is_time: false
            ai_context:
              synonyms: ["city", "location city"]

          - name: s_state
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: s_state
            description: State/province code (e.g. TN)
            dimension:
              is_time: false
            ai_context:
              synonyms: ["state", "region"]

      - name: item
        source: item
        primary_key: [i_item_sk]
        unique_keys:
          - [i_item_id]
        description: Item/Product dimension — 18,000 rows
        ai_context:
          synonyms: ["products", "items", "merchandise", "SKUs"]
        fields:
          - name: i_item_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_item_sk
            description: Surrogate key for item
            dimension:
              is_time: false

          - name: i_category
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_category
            description: "Item category — values: Books, Children, Electronics, Home, Jewelry, Men, Music, Shoes, Sports, Women (0.2% NULL)"
            dimension:
              is_time: false
            ai_context:
              synonyms: ["category", "product category", "department"]

          - name: i_brand
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_brand
            description: Brand name (0.2% NULL)
            dimension:
              is_time: false
            ai_context:
              synonyms: ["brand", "manufacturer"]

          - name: i_class
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_class
            description: Item class (0.2% NULL)
            dimension:
              is_time: false
            ai_context:
              synonyms: ["class", "item class"]

          - name: i_product_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_product_name
            description: Product name (0.2% NULL)
            dimension:
              is_time: false
            ai_context:
              synonyms: ["product name", "item name", "name"]

          - name: i_color
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_color
            description: Item color (0.2% NULL)
            dimension:
              is_time: false
            ai_context:
              synonyms: ["color", "colour"]

      - name: customer
        source: customer
        primary_key: [c_customer_sk]
        unique_keys:
          - [c_customer_id]
        description: Customer dimension — 100,000 rows
        ai_context:
          synonyms: ["customers", "shoppers", "buyers", "clients"]
        fields:
          - name: c_customer_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_customer_sk
            description: Surrogate key for customer
            dimension:
              is_time: false

          - name: c_preferred_cust_flag
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_preferred_cust_flag
            description: Preferred customer indicator — Y=preferred, N=standard (3.4% NULL)
            dimension:
              is_time: false
            ai_context:
              synonyms: ["preferred customer", "VIP", "loyalty flag"]

          - name: c_birth_country
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_birth_country
            description: Country where customer was born (3.4% NULL)
            dimension:
              is_time: false
            ai_context:
              synonyms: ["birth country", "country of birth", "nationality"]

          - name: c_birth_year
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_birth_year
            description: Customer birth year (1924–1992, 3.5% NULL) — used for age_group computation
            dimension:
              is_time: false
            ai_context:
              synonyms: ["birth year", "year of birth"]

          - name: age_group
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: "CASE WHEN (d.d_year - c.c_birth_year) < 20 THEN '< 20' WHEN (d.d_year - c.c_birth_year) BETWEEN 20 AND 29 THEN '20-29' WHEN (d.d_year - c.c_birth_year) BETWEEN 30 AND 39 THEN '30-39' WHEN (d.d_year - c.c_birth_year) BETWEEN 40 AND 49 THEN '40-49' WHEN (d.d_year - c.c_birth_year) BETWEEN 50 AND 59 THEN '50-59' WHEN (d.d_year - c.c_birth_year) >= 60 THEN '60+' END"
            description: Computed age group — requires JOIN to date_dim (alias d) and customer (alias c). NULL when c_birth_year IS NULL — do not COALESCE.
            dimension:
              is_time: false
            ai_context:
              synonyms: ["age group", "age bracket", "age band", "age range"]

      - name: v_transactions
        source: "SELECT ss_store_sk AS store_sk, ss_item_sk AS item_sk, ss_customer_sk AS customer_sk, ss_sold_date_sk AS date_sk, ss_ticket_number AS ticket_number, COALESCE(ss_sales_price * ss_quantity, 0.0) AS sale_amount, 0.0 AS return_amount, COALESCE(ss_quantity, 0) AS quantity, 'sale' AS row_type FROM store_sales UNION ALL SELECT sr_store_sk, sr_item_sk, sr_customer_sk, sr_returned_date_sk, sr_ticket_number, 0.0, COALESCE(sr_return_amt, 0.0), 0, 'return' FROM store_returns"
        description: Unified transaction view — store_sales UNION ALL store_returns. 3,168,271 rows total. sale_amount=0 on return rows; return_amount=0 on sale rows.
        ai_context:
          synonyms: ["transactions", "all transactions", "unified sales and returns", "transaction fact"]
        fields:
          - name: store_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: store_sk
            description: FK → store.s_store_sk
            dimension:
              is_time: false

          - name: item_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: item_sk
            description: FK → item.i_item_sk
            dimension:
              is_time: false

          - name: customer_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_sk
            description: FK → customer.c_customer_sk (nullable — use LEFT JOIN to customer)
            dimension:
              is_time: false

          - name: date_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: date_sk
            description: FK → date_dim.d_date_sk (sale date for sales, return date for returns)
            dimension:
              is_time: false

          - name: ticket_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ticket_number
            description: Transaction identifier — shared between sales and returns
            ai_context:
              synonyms: ["ticket", "transaction ID", "receipt number"]

          - name: quantity
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: quantity
            description: Quantity sold (0 on return rows)
            ai_context:
              synonyms: ["quantity", "units", "qty"]

          - name: sale_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: sale_amount
            description: Sale revenue — ss_sales_price * ss_quantity (0 on return rows, NOT NULL)
            ai_context:
              synonyms: ["sales amount", "revenue", "sale value"]

          - name: return_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: return_amount
            description: Refund amount — sr_return_amt (0 on sale rows, NOT NULL)
            ai_context:
              synonyms: ["return amount", "refund amount", "returns"]

          - name: row_type
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: row_type
            description: Row origin — 'sale' or 'return'. Use for ticket counting, not for filtering amounts.
            dimension:
              is_time: false
            ai_context:
              synonyms: ["transaction type", "row type", "sale or return"]

    relationships:
      - name: transactions_to_date
        from: v_transactions
        to: date_dim
        from_columns: [date_sk]
        to_columns: [d_date_sk]

      - name: transactions_to_store
        from: v_transactions
        to: store
        from_columns: [store_sk]
        to_columns: [s_store_sk]

      - name: transactions_to_item
        from: v_transactions
        to: item
        from_columns: [item_sk]
        to_columns: [i_item_sk]

      - name: transactions_to_customer
        from: v_transactions
        to: customer
        from_columns: [customer_sk]
        to_columns: [c_customer_sk]

    metrics:
      - name: total_sales
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(v.sale_amount)
        description: Total sales revenue — sum of sale_amount across all rows
        ai_context:
          synonyms: ["total revenue", "gross sales", "sales amount", "revenue"]

      - name: total_quantity
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(v.quantity)
        description: Total units sold
        ai_context:
          synonyms: ["units sold", "quantity sold", "total units"]

      - name: total_returns
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(v.return_amount)
        description: Total return/refund amount
        ai_context:
          synonyms: ["total refunds", "returns amount", "refund total"]

      - name: net_sales
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(v.sale_amount) - SUM(v.return_amount)
        description: Net sales = total_sales - total_returns. No CTE needed — v_transactions handles it.
        ai_context:
          synonyms: ["net revenue", "net sales", "sales minus returns"]

      - name: return_rate
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: (SUM(v.return_amount) / NULLIF(SUM(v.sale_amount), 0)) * 100
        description: "Return rate % = (total_returns / total_sales) * 100. Never filter rows — include all rows so denominator is correct."
        ai_context:
          synonyms: ["return rate", "refund rate", "return percentage"]

      - name: sales_tickets
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT CASE WHEN v.row_type = 'sale' THEN v.ticket_number END)
        description: Number of distinct sale transactions. Must use row_type filter inside CASE — never COUNT(DISTINCT ticket_number) alone.
        ai_context:
          synonyms: ["transaction count", "ticket count", "number of transactions", "number of sales"]

      - name: avg_net_sales_per_ticket
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: (SUM(v.sale_amount) - SUM(v.return_amount)) / NULLIF(COUNT(DISTINCT CASE WHEN v.row_type = 'sale' THEN v.ticket_number END), 0)
        description: Average net sales per transaction — net_sales divided by sales_tickets. This is the correct interpretation of 'average net sales per transaction', NOT AVG().
        ai_context:
          synonyms: ["average transaction value", "avg net sales per ticket", "average net sales per transaction", "ATV"]
