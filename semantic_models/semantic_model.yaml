        from_columns: [ss_customer_sk]
        to_columns: [c_customer_sk]

      - name: store_returns_to_date
        from: store_returns
        to: date_dim
        from_columns: [sr_returned_date_sk]
        to_columns: [d_date_sk]

      - name: store_returns_to_store
        from: store_returns
        to: store
        from_columns: [sr_store_sk]
        to_columns: [s_store_sk]

      - name: store_returns_to_item
        from: store_returns
        to: item
        from_columns: [sr_item_sk]
        to_columns: [i_item_sk]

      - name: store_returns_to_customer
        from: store_returns
        to: customer
        from_columns: [sr_customer_sk]
        to_columns: [c_customer_sk]

    metrics:
      - name: total_sales
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ss.ss_sales_price * ss.ss_quantity)
        description: Total sales revenue — from store_sales only
        ai_context:
          synonyms: ["total revenue", "gross sales", "sales amount", "revenue"]

      - name: total_quantity
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(ss.ss_quantity)
        description: Total units sold — from store_sales only
        ai_context:
          synonyms: ["units sold", "quantity sold", "total units"]

      - name: total_returns
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(sr.sr_return_amt)
        description: Total return amount — from store_returns only
        ai_context:
          synonyms: ["total refunds", "returns amount", "refund total"]

      - name: net_sales
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COALESCE(SUM(ss.ss_sales_price * ss.ss_quantity), 0) - COALESCE(SUM(sr.sr_return_amt), 0)
        description: "Net sales = total_sales - total_returns. REQUIRES CTE pattern: aggregate store_sales and store_returns separately, then FULL OUTER JOIN. Never compute by joining facts directly."
        ai_context:
          synonyms: ["net revenue", "net sales", "sales minus returns"]

      - name: return_rate
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: (COALESCE(SUM(sr.sr_return_amt), 0) / NULLIF(COALESCE(SUM(ss.ss_sales_price * ss.ss_quantity), 0), 0)) * 100
        description: "Return rate % = (total_returns / total_sales) * 100. REQUIRES CTE pattern: aggregate each fact separately, then FULL OUTER JOIN."
        ai_context:
          synonyms: ["return rate", "refund rate", "return percentage"]

      - name: sales_tickets
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT ss.ss_ticket_number)
        description: Number of distinct sale transactions — from store_sales only
        ai_context:
          synonyms: ["transaction count", "ticket count", "number of transactions", "number of sales"]
